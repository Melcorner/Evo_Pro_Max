server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: integration-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: integration-api-logs
          app: api
          __path__: /var/log/integration/api.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            service: service
            message: message
            component: component
            tenant_id: tenant_id
            event_id: event_id
            event_key: event_key
            uid: uid
            operation: operation
            status: status
            duration_ms: duration_ms
            doc_type: doc_type
            doc_id: doc_id
            exception_type: exception_type
      - labels:
          level:
          logger:
          service:
          operation:
          status:
          component:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: integration-worker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: integration-worker-logs
          app: worker
          __path__: /var/log/integration/worker.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            service: service
            message: message
            component: component
            tenant_id: tenant_id
            event_id: event_id
            event_key: event_key
            uid: uid
            operation: operation
            status: status
            duration_ms: duration_ms
            doc_type: doc_type
            doc_id: doc_id
            exception_type: exception_type
      - labels:
          level:
          logger:
          service:
          operation:
          status:
          component:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: integration-fiscal-poller-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: integration-fiscal-poller-logs
          app: fiscal_poller
          __path__: /var/log/integration/fiscal_poller.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            service: service
            message: message
            component: component
            tenant_id: tenant_id
            event_id: event_id
            event_key: event_key
            uid: uid
            operation: operation
            status: status
            duration_ms: duration_ms
            doc_type: doc_type
            doc_id: doc_id
            exception_type: exception_type
      - labels:
          level:
          logger:
          service:
          operation:
          status:
          component:
      - timestamp:
          source: timestamp
          format: RFC3339Nano