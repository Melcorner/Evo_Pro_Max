groups:
  - name: integration-observability
    rules:
      - alert: IntegrationWorkerHeartbeatStale
        expr: time() - integration_worker_last_heartbeat_unixtime{job="integration-worker"} > 60
        for: 2m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: Worker heartbeat is stale
          description: Worker heartbeat has not updated for more than 60 seconds.

      - alert: IntegrationApiErrorRateHigh
        expr: |
          (
            sum(rate(integration_api_requests_total{job="integration-api",status=~"5..",path!~"/metrics|/favicon.ico|/openapi.json"}[5m]))
            /
            clamp_min(
              sum(rate(integration_api_requests_total{job="integration-api",path!~"/metrics|/favicon.ico|/openapi.json"}[5m])),
              0.001
            )
          ) > 0.05
          and
          sum(rate(integration_api_requests_total{job="integration-api",path!~"/metrics|/favicon.ico|/openapi.json"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: API 5xx error rate is high
          description: More than 5% of non-infrastructure API requests returned 5xx over the last 10 minutes.

      - alert: IntegrationApiLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(integration_api_request_duration_seconds_bucket{job="integration-api",path!~"/metrics|/favicon.ico|/openapi.json"}[5m])
            )
          ) > 1
          and
          sum(rate(integration_api_requests_total{job="integration-api",path!~"/metrics|/favicon.ico|/openapi.json"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: API p95 latency is high
          description: API p95 latency has been above 1 second for 10 minutes.

      - alert: IntegrationFiscalPollerPendingChecksHigh
        expr: integration_fiscal_poller_pending_checks{job="integration-fiscal-poller"} > 20
        for: 10m
        labels:
          severity: warning
          service: fiscal-poller
        annotations:
          summary: Fiscal poller backlog is growing
          description: Fiscal poller has more than 20 pending checks for at least 10 minutes.

      - alert: IntegrationWorkerRetryOrFailedActivity
        expr: increase(integration_worker_events_processed_total{job="integration-worker",result=~"retry|failed"}[15m]) > 0
        labels:
          severity: info
          service: worker
        annotations:
          summary: Worker retry or failed activity detected
          description: Worker has produced retry or failed results within the last 15 minutes.

      - alert: IntegrationFiscalizationSendErrors
        expr: |
          increase(integration_fiscalization_requests_total{result=~"send_failed|unexpected_error"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: fiscalization
        annotations:
          summary: Fiscalization send errors detected
          description: Fiscalization requests returned send_failed or unexpected_error within the last 15 minutes.

      - alert: IntegrationFiscalizationStatusCheckTransportErrors
        expr: |
          increase(integration_fiscalization_status_checks_total{result="transport_error"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: fiscalization
        annotations:
          summary: Fiscalization status check transport errors detected
          description: Status checks to fiscalization provider returned transport_error within the last 15 minutes.