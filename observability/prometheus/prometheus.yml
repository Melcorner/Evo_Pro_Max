global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus-config/alerts.yml

scrape_configs:
  - job_name: "integration-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
  - job_name: "integration-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]
  - job_name: "integration-fiscal-poller"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8002"]
